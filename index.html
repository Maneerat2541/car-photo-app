<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ระบบเก็บข้อมูลรูปรถ</title>

<!-- PWA: ติดตั้งเป็นแอปบนหน้าจอโฮมได้ (มือถือเท่านั้น หน้าออฟฟิศไม่เกี่ยว) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a6fdb">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CarPhoto">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- ตั้งค่าปลายทางออนไลน์ (Firebase / Google Sheet) แก้ที่ config.js ไฟล์เดียว -->
<script src="config.js"></script>

<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:#d9d7d1;font-family:'Sarabun',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#1c1c1e}
  input{font-family:inherit}
  button{font-family:inherit}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .scr{animation:fadeup .22s ease both}
</style>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
</head>
<body>
<div id="root"></div>

<script type="text/plain" id="app-src">
class CarPhotoApp extends React.Component {
  constructor(props){
    super(props);
    this.CLOUD_KEY = 'carphoto_cloud_v1';
    this.steps = [
      { key:'bar',   title:'บาร์รถ',    hint:'ถ่ายบาร์โค้ด/สติกเกอร์บนตัวรถ ให้เห็นเลขชัด' },
      { key:'back',  title:'หลังรถ',    hint:'ถ่ายท้ายรถให้เห็นทั้งคัน แสงสว่างพอ' },
      { key:'plate', title:'ทะเบียนรถ', hint:'ถ่ายป้ายทะเบียนให้อ่านออกทุกตัวอักษร' },
    ];
    // To go fully online + realtime across devices, define window.CARPHOTO_FIREBASE
    // with your Firebase web config { apiKey, projectId, appId, collection }.
    this.SYNC_CONFIG = (typeof window !== 'undefined' && window.CARPHOTO_FIREBASE) || null;
    this.state = {
      screen:'home', stepIndex:0, shots:[null,null,null], captured:null, plate:'',
      cameraReady:false, cameraError:false, submitting:false, tick:0, lightbox:null,
      successInfo:null, gps:null, cloud:[], syncMode:'local', toast:null, qrOpen:false, qrImg:null,
      samples:{},   // รูปตัวอย่างจากหน้าออฟฟิศ { bar, back, plate } (แสดงอย่างเดียว)
    };
    this.setVideo = this.setVideo.bind(this);
    this._prevScreen = 'home';
  }

  async componentDidMount(){
    try {
      const m = await import('./sync.js');
      this.sync = m;
      const mode = await m.initSync(this.SYNC_CONFIG);
      this.setState({ syncMode: mode });
      this._unsub = m.subscribe(recs => this.setState({ cloud: recs }));
      this._unsubSamples = m.subscribeSamples(s => this.setState({ samples: s || {} }));
    } catch(e){ console.warn('sync load failed', e); }
  }
  componentDidUpdate(){
    const scr = this.state.screen, prev = this._prevScreen;
    if (scr === prev) return;
    if (scr === 'capture'){ this.startCamera(); this.startClock(); this.startGPS(); }
    else if (prev === 'capture'){ this.stopCamera(); this.stopClock(); this.stopGPS(); }
    this._prevScreen = scr;
  }
  componentWillUnmount(){
    this.stopCamera(); this.stopClock(); this.stopGPS();
    if (this._unsub) this._unsub();
    if (this._unsubSamples) this._unsubSamples();
    clearTimeout(this._toastT);
  }

  // ── ช่องแสดงรูปตัวอย่าง (อ่านอย่างเดียว — อัปโหลดจากหน้าออฟฟิศ) พร้อมลายน้ำ "ตัวอย่าง" ──
  sampleBox(img, opts){
    opts = opts || {};
    const w = opts.width, h = opts.height, r = opts.radius != null ? opts.radius : 10;
    const base = { position:'relative', width:w, height:h, borderRadius:r, overflow:'hidden', flex:'none', background:'#e8e6e1' };
    if (!img){
      return (
        <div style={{ ...base, display:'flex', alignItems:'center', justifyContent:'center', textAlign:'center', padding:8, border:'1px dashed #cfccc4' }}>
          <div style={{ fontSize:11, color:'#a7a49c', lineHeight:1.45 }}>ยังไม่มีรูปตัวอย่าง<br/>(ออฟฟิศเป็นผู้เพิ่ม)</div>
        </div>
      );
    }
    const hn = typeof h === 'number' ? h : 150;
    const wm = Math.max(13, Math.round(hn * 0.24));
    return (
      <div onClick={()=>this.openLightbox(img)} style={{ ...base, cursor:'zoom-in' }}>
        <img src={img} style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', pointerEvents:'none' }}>
          <span style={{ transform:'rotate(-18deg)', color:'rgba(255,255,255,.85)', fontWeight:700, fontSize:wm, letterSpacing:'.1em', textShadow:'0 1px 8px rgba(0,0,0,.6)', whiteSpace:'nowrap' }}>ตัวอย่าง</span>
        </div>
      </div>
    );
  }

  setVideo(node){ this.video = node; if (node && this.stream) node.srcObject = this.stream; }

  async startCamera(){
    this.stopCamera();
    this.setState({ cameraReady:false, cameraError:false });
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ ideal:'environment' } }, audio:false });
      this.stream = stream;
      if (this.video) this.video.srcObject = stream;
      this.setState({ cameraReady:true });
    } catch(e){
      this.setState({ cameraError:true, cameraReady:false });
    }
  }
  stopCamera(){ if (this.stream){ this.stream.getTracks().forEach(t=>t.stop()); this.stream=null; } }
  startClock(){ this.stopClock(); this.clock = setInterval(()=>this.setState({ tick:Date.now() }), 1000); }
  stopClock(){ if (this.clock){ clearInterval(this.clock); this.clock=null; } }

  startGPS(){
    if (!navigator.geolocation){ this.setDemoCoords(); return; }
    this.setState({ gps:{ status:'locating' } });
    navigator.geolocation.getCurrentPosition(p=>this.onCoords(p), ()=>this.setDemoCoords(), { enableHighAccuracy:true, timeout:8000, maximumAge:10000 });
    try { this.geoWatch = navigator.geolocation.watchPosition(p=>this.onCoords(p), ()=>{}, { enableHighAccuracy:true }); } catch(e){}
  }
  onCoords(p){ this.coords = { lat:p.coords.latitude, lng:p.coords.longitude, acc:p.coords.accuracy, demo:false }; this.setState({ gps:{ status:'ok', lat:this.coords.lat, lng:this.coords.lng, acc:this.coords.acc } }); }
  setDemoCoords(){ this.coords = this.demoCoords(); this.setState({ gps:{ status:'demo', lat:this.coords.lat, lng:this.coords.lng } }); }
  demoCoords(){ return { lat:13.75633, lng:100.50177, acc:35, demo:true }; }
  stopGPS(){ if (this.geoWatch!=null){ try{ navigator.geolocation.clearWatch(this.geoWatch); }catch(e){} this.geoWatch=null; } }

  pad2(n){ return String(n).padStart(2,'0'); }
  fmtDate(d){ return this.pad2(d.getDate())+'/'+this.pad2(d.getMonth()+1)+'/'+d.getFullYear(); }
  fmtTime(d){ return this.pad2(d.getHours())+':'+this.pad2(d.getMinutes()); }
  dateKey(d){ return d.getFullYear()+'-'+this.pad2(d.getMonth()+1)+'-'+this.pad2(d.getDate()); }

  startFlow(){
    const idx = this.state.shots.findIndex(x=>!x);
    if (idx === -1) this.setState({ screen:'summary' });
    else this.setState({ stepIndex:idx, screen:'capture', captured:null });
  }

  shutter(){
    const s = this.state, now = new Date(), v = this.video;
    let w = 1080, h = 1440;
    if (v && v.videoWidth){ w = v.videoWidth; h = v.videoHeight; }
    const maxSide = 1000, scale = Math.min(1, maxSide / Math.max(w, h));
    const ow = Math.round(w*scale), oh = Math.round(h*scale);
    const c = document.createElement('canvas'); c.width = ow; c.height = oh;
    const ctx = c.getContext('2d');
    if (s.cameraReady && v && v.videoWidth){
      ctx.drawImage(v, 0, 0, ow, oh);
    } else {
      const g = ctx.createLinearGradient(0,0,0,oh); g.addColorStop(0,'#3a3f45'); g.addColorStop(1,'#20242a');
      ctx.fillStyle = g; ctx.fillRect(0,0,ow,oh);
      ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,.9)';
      ctx.font = '700 ' + Math.round(ow*0.05) + 'px "Sarabun", sans-serif';
      ctx.fillText(this.steps[s.stepIndex].title, ow/2, oh*0.44);
      ctx.font = Math.round(ow*0.03) + 'px "Sarabun", sans-serif'; ctx.fillStyle = 'rgba(255,255,255,.55)';
      ctx.fillText('ภาพจำลอง (อุปกรณ์นี้ไม่มีกล้อง)', ow/2, oh*0.44 + Math.round(ow*0.07));
      ctx.textAlign = 'start';
    }
    const loc = this.coords || this.demoCoords();
    const barH = Math.round(oh*0.092), fs = Math.round(barH*0.24);
    ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(0, oh-barH, ow, barH);
    ctx.fillStyle = '#fff'; ctx.textBaseline = 'middle'; ctx.textAlign = 'start';
    ctx.font = fs + 'px "Sarabun", sans-serif';
    const line1 = this.fmtDate(now)+' '+this.fmtTime(now)+':'+this.pad2(now.getSeconds())+'   •   '+this.steps[s.stepIndex].title;
    ctx.fillText(line1, Math.round(ow*0.03), oh-barH*0.64);
    ctx.font = Math.round(fs*0.92) + 'px "Sarabun", sans-serif'; ctx.fillStyle = 'rgba(255,255,255,.86)';
    const gpsTxt = 'GPS ' + loc.lat.toFixed(5) + ', ' + loc.lng.toFixed(5) + (loc.demo ? ' (จำลอง)' : '') + '   · ล็อคพิกัด/เวลา';
    ctx.fillText(gpsTxt, Math.round(ow*0.03), oh-barH*0.26);
    const img = c.toDataURL('image/jpeg', 0.72);
    this.stopCamera();
    this.setState({ screen:'review', captured:{ img, time:now.getTime(), label:this.fmtDate(now)+' '+this.fmtTime(now), location:loc } });
  }

  retake(){ this.setState({ screen:'capture', captured:null }); }

  useShot(){
    const s = this.state, shots = s.shots.slice();
    shots[s.stepIndex] = { key:this.steps[s.stepIndex].key, title:this.steps[s.stepIndex].title, img:s.captured.img, time:s.captured.time, timeLabel:s.captured.label, location:s.captured.location || null };
    if (s.stepIndex < 2) this.setState({ shots, stepIndex:s.stepIndex+1, screen:'capture', captured:null });
    else this.setState({ shots, screen:'summary', captured:null });
  }

  submitCloud(){
    if (this.state.submitting || !this.sync) return;
    this.setState({ submitting:true });
    const now = new Date(), dateKey = this.dateKey(now);
    const loc = this.state.shots.map(sh=>sh && sh.location).filter(Boolean).pop() || null;
    const rec = { id:Date.now(), dateKey, dateLabel:this.fmtDate(now), time:this.fmtTime(now), plate:this.state.plate.trim(), location:loc,
      shots: this.state.shots.map(sh=>({ key:sh.key, title:sh.title, img:sh.img, timeLabel:sh.timeLabel, location:sh.location || null })) };
    const done = ()=>{
      this._prevScreen = 'home';
      this.setState({ submitting:false, screen:'home', shots:[null,null,null], stepIndex:0, plate:'', captured:null, toast:'ส่งเข้าคลาวด์แล้ว · เริ่มคันใหม่ได้เลย' });
      clearTimeout(this._toastT);
      this._toastT = setTimeout(()=>this.setState({ toast:null }), 2800);
    };
    Promise.resolve(this.sync.addRecord(rec)).then(done).catch(e=>{ console.warn('upload failed', e); done(); });
  }

  startNew(){ this.setState({ shots:[null,null,null], stepIndex:0, plate:'', captured:null, screen:'home', successInfo:null }); }
  openLightbox(img){ if (img) this.setState({ lightbox:img }); }

  async openQR(){
    this.setState({ qrOpen: true });
    if (this.state.qrImg) return;
    try {
      const mod = await import('https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/+esm');
      const qrcode = mod.default || mod;
      const qr = qrcode(0, 'M');
      qr.addData(String(window.location.href));
      qr.make();
      this.setState({ qrImg: qr.createDataURL(7, 12) });
    } catch(e){ console.warn('qr generate failed', e); }
  }
  closeQR(){ this.setState({ qrOpen: false }); }

  // ── screens ──────────────────────────────────────────────────────────────
  renderHome(){
    const s = this.state, shots = s.shots;
    const home = this.steps.map((step,i)=>({ n:String(i+1), title:step.title, hint:step.hint, done:!!shots[i], timeLabel: shots[i] ? shots[i].timeLabel : '' }));
    const startLabel = shots.every(x=>!x) ? 'เริ่มถ่าย (3 ขั้นตอน)' : (shots.every(x=>x) ? 'ตรวจ & ส่งเข้าคลาวด์' : 'ถ่ายต่อ');
    const syncBadge = s.syncMode==='firebase' ? 'ออนไลน์ · เรียลไทม์' : 'เดโมในเครื่อง · เรียลไทม์ข้ามแท็บ';

    return (
      <div className="scr" style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
        <div style={{padding:'26px 22px 18px',background:'#fff',borderBottom:'1px solid #e6e4df'}}>
          <div style={{fontSize:12,letterSpacing:'.14em',color:'#2a6fdb',fontWeight:600}}>ระบบเก็บข้อมูลรูปรถ</div>
          <div style={{fontSize:24,fontWeight:700,marginTop:4}}>ถ่าย 3 ขั้น ส่งเข้าคลาวด์</div>
          <div style={{fontSize:14,color:'#6b6f76',marginTop:6,lineHeight:1.5}}>บังคับถ่ายจากกล้องทุกขั้น · ล็อควันที่-เวลา-พิกัด GPS ลงบนรูป · ส่งเข้าคลาวด์แยกตามวันที่ให้เอง</div>
          <div style={{display:'inline-flex',alignItems:'center',gap:7,marginTop:12,background:'#eef3fb',color:'#2a6fdb',fontSize:11.5,fontWeight:600,padding:'5px 11px',borderRadius:20}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:'#57c98a'}}></span>{syncBadge} · ล็อก GPS
          </div>
        </div>

        <div style={{flex:1,padding:'20px 18px',display:'flex',flexDirection:'column',gap:12}}>
          <div style={{fontSize:12,color:'#8a8f96',marginBottom:2}}>รูปตัวอย่างของแต่ละขั้น (ตั้งค่าจากหน้าจอออฟฟิศ) — ถ่ายให้เหมือนแบบ</div>

          {home.map((h,i)=>(
            <div key={i} style={{display:'flex',gap:14,alignItems:'center',background:'#fff',border:'1px solid #e6e4df',borderRadius:16,padding:'13px 14px'}}>
              <div style={{position:'relative',flex:'none'}}>
                {this.sampleBox(s.samples[this.steps[i].key], {width:108,height:86,radius:11})}
                <div style={{position:'absolute',top:-8,left:-8,width:25,height:25,borderRadius:'50%',background:'#2a6fdb',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,border:'2px solid #fff'}}>{h.n}</div>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:17,fontWeight:600}}>{h.title}</div>
                <div style={{fontSize:12.5,color:'#8a8f96',lineHeight:1.4,marginTop:2}}>{h.hint}</div>
              </div>
              {h.done && (
                <div style={{textAlign:'right',flex:'none'}}>
                  <div style={{color:'#1f8a5b',fontWeight:700,fontSize:15}}>✓</div>
                  <div style={{fontFamily:'ui-monospace,monospace',fontSize:10,color:'#a7a49c'}}>{h.timeLabel}</div>
                </div>
              )}
            </div>
          ))}

          <div style={{display:'flex',gap:9,alignItems:'flex-start',background:'#fff7ed',border:'1px solid #f4e2c9',borderRadius:12,padding:'12px 14px',marginTop:4}}>
            <div style={{color:'#c07b1e',fontWeight:700,fontSize:14,flex:'none'}}>!</div>
            <div style={{fontSize:12.5,color:'#946222',lineHeight:1.5}}>ต้องถ่ายจากกล้องเท่านั้น อัปโหลดจากคลังภาพไม่ได้ และห้ามข้ามขั้นตอน</div>
          </div>
        </div>

        <div style={{padding:'16px 18px 26px',background:'#fff',borderTop:'1px solid #e6e4df',display:'flex',flexDirection:'column',gap:12}}>
          <button onClick={()=>this.startFlow()} style={{width:'100%',border:'none',background:'#2a6fdb',color:'#fff',borderRadius:16,padding:17,fontSize:18,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:13}}>
            <svg viewBox="0 0 48 40" width="34" height="28" style={{display:'block'}}><rect x="2" y="11" width="44" height="25" rx="5" fill="#fff"></rect><path d="M17 11 L20 5 H28 L31 11 Z" fill="#fff"></path><circle cx="24" cy="23.5" r="8.5" fill="#2a6fdb"></circle><circle cx="24" cy="23.5" r="4.3" fill="#fff"></circle></svg>
            {startLabel}
          </button>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>this.openQR()} style={{flex:1,border:'1.5px solid #d9d7d1',background:'#fff',color:'#1c1c1e',borderRadius:12,padding:11,fontSize:13.5,fontWeight:600,cursor:'pointer'}}>เปิดบนมือถือ · QR</button>
            <button onClick={()=>this.setState({ screen:'gallery' })} style={{flex:1,border:'1.5px solid #d9d7d1',background:'#fff',color:'#2a6fdb',borderRadius:12,padding:11,fontSize:13.5,fontWeight:600,cursor:'pointer'}}>คลังรูป ›</button>
          </div>
        </div>
      </div>
    );
  }

  renderCapture(){
    const s = this.state, st = this.steps[s.stepIndex] || this.steps[0], n = new Date();
    const captureDots = [0,1,2].map(i=>{
      const done = i < s.stepIndex, cur = i === s.stepIndex;
      return { bg: done ? '#2a6fdb' : (cur ? '#1c1c1e' : '#ffffff'), brd: done ? '#2a6fdb' : (cur ? '#ffffff' : '#4a4f55') };
    });
    const nowLabel = this.fmtDate(n)+' '+this.fmtTime(n)+':'+this.pad2(n.getSeconds());
    const gp = s.gps; let gpsText='GPS · เปิดใช้พิกัด', gpsColor='#e0b64a';
    if (gp){
      if (gp.status==='locating'){ gpsText='GPS · กำลังหาพิกัด…'; gpsColor='#e0b64a'; }
      else if (gp.status==='ok'){ gpsText='GPS · '+gp.lat.toFixed(5)+', '+gp.lng.toFixed(5); gpsColor='#57c98a'; }
      else if (gp.status==='demo'){ gpsText='GPS · '+gp.lat.toFixed(5)+', '+gp.lng.toFixed(5)+' (จำลอง)'; gpsColor='#e0b64a'; }
    }

    return (
      <div className="scr" style={{display:'flex',flexDirection:'column',minHeight:'100vh',background:'#15171a'}}>
        <div style={{padding:'16px 18px 12px',background:'#1c1f23',color:'#fff'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <button onClick={()=>this.setState({ screen:'home' })} style={{border:'none',background:'none',color:'#aeb4bb',fontSize:15,cursor:'pointer',padding:0}}>‹ ยกเลิก</button>
            <div style={{fontSize:12.5,color:'#aeb4bb'}}>ขั้นที่ {s.stepIndex+1} / 3</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12,marginTop:8}}>
            <div style={{fontSize:21,fontWeight:700}}>{st.title}</div>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              {captureDots.map((d,i)=>(<span key={i} style={{width:8,height:8,borderRadius:'50%',background:d.bg,border:'1.5px solid '+d.brd}}></span>))}
            </div>
          </div>
          <div style={{fontSize:13,color:'#9aa0a7',marginTop:3}}>{st.hint}</div>
        </div>

        <div style={{padding:'12px 16px 10px',background:'#1c1f23',borderTop:'1px solid #2a2e33'}}>
          <div style={{fontSize:11.5,color:'#8a9099',marginBottom:7,display:'flex',justifyContent:'space-between'}}><span>ตัวอย่างที่ต้องถ่าย</span><span style={{color:'#666b73'}}>ตั้งค่าจากออฟฟิศ</span></div>
          {this.sampleBox(s.samples[st.key], {width:'100%',height:170,radius:10})}
        </div>

        <div style={{flex:1,position:'relative',background:'#000',overflow:'hidden',minHeight:220}}>
          <video ref={this.setVideo} autoPlay muted playsInline style={{width:'100%',height:'100%',objectFit:'cover',display:'block',background:'#000'}}></video>
          <div style={{position:'absolute',inset:26,border:'2px dashed rgba(255,255,255,.7)',borderRadius:14,pointerEvents:'none',display:'flex',justifyContent:'center',alignItems:'flex-start'}}>
            <span style={{marginTop:-11,background:'rgba(0,0,0,.6)',color:'#fff',fontSize:11,padding:'3px 10px',borderRadius:12,whiteSpace:'nowrap'}}>จัด{st.title}ให้อยู่ในกรอบ</span>
          </div>
          <div style={{position:'absolute',left:12,bottom:12,background:'rgba(0,0,0,.66)',color:'#fff',fontFamily:'ui-monospace,monospace',fontSize:11,padding:'5px 9px',borderRadius:7}}>{nowLabel} · ล็อคเวลา</div>
          <div style={{position:'absolute',left:12,bottom:44,background:'rgba(0,0,0,.66)',fontFamily:'ui-monospace,monospace',fontSize:10.5,padding:'5px 9px',borderRadius:7,color:gpsColor}}>{gpsText}</div>

          {s.cameraError && (
            <div style={{position:'absolute',inset:0,background:'rgba(15,17,20,.94)',color:'#fff',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,padding:30,textAlign:'center'}}>
              <div style={{fontSize:16,fontWeight:600}}>เปิดกล้องไม่ได้</div>
              <div style={{fontSize:13,color:'#aeb4bb',lineHeight:1.5}}>อุปกรณ์นี้ไม่มีกล้องหรือยังไม่อนุญาต<br/>กด “อนุญาตกล้อง” แล้วลองใหม่<br/>(หรือกดถ่ายเพื่อทดลอง flow ด้วยภาพจำลอง)</div>
              <button onClick={()=>this.startCamera()} style={{border:'1.5px solid #566',background:'transparent',color:'#fff',borderRadius:10,padding:'10px 18px',fontSize:14,cursor:'pointer'}}>อนุญาตกล้อง</button>
            </div>
          )}
        </div>

        <div style={{padding:'18px 0 26px',background:'#1c1f23',display:'flex',flexDirection:'column',alignItems:'center',gap:9}}>
          <button onClick={()=>this.shutter()} style={{width:74,height:74,borderRadius:'50%',border:'4px solid #fff',background:'#fff',boxShadow:'0 0 0 4px #1c1f23,0 0 0 6px #fff',cursor:'pointer'}}></button>
          <div style={{fontSize:11.5,color:'#8a9099'}}>แตะเพื่อถ่าย · บังคับกล้อง</div>
        </div>
      </div>
    );
  }

  renderReview(){
    const s = this.state, st = this.steps[s.stepIndex] || this.steps[0];
    const useLabel = s.stepIndex===2 ? 'ใช้รูปนี้ · ไปสรุป' : 'ใช้รูปนี้ · ถัดไป';
    return (
      <div className="scr" style={{display:'flex',flexDirection:'column',minHeight:'100vh',background:'#15171a'}}>
        <div style={{padding:'18px 18px 12px',background:'#1c1f23',color:'#fff'}}>
          <div style={{fontSize:12.5,color:'#aeb4bb'}}>ขั้นที่ {s.stepIndex+1} / 3 · ตรวจรูป</div>
          <div style={{fontSize:21,fontWeight:700,marginTop:3}}>{st.title}</div>
          <div style={{fontSize:13,color:'#9aa0a7',marginTop:3}}>ชัดพอไหม? ถ่ายใหม่ได้ก่อนไปต่อ</div>
        </div>
        <div style={{flex:1,padding:16,display:'flex',alignItems:'center',justifyContent:'center',background:'#000'}}>
          {s.captured && <img src={s.captured.img} onClick={()=>this.openLightbox(s.captured.img)} style={{maxWidth:'100%',maxHeight:'100%',borderRadius:12,cursor:'zoom-in'}} />}
        </div>
        <div style={{padding:'16px 16px 26px',background:'#1c1f23',display:'grid',gridTemplateColumns:'1fr 1.3fr',gap:12}}>
          <button onClick={()=>this.retake()} style={{border:'1.5px solid #4a4f55',background:'transparent',color:'#fff',borderRadius:13,padding:15,fontSize:15,fontWeight:600,cursor:'pointer'}}>ถ่ายใหม่</button>
          <button onClick={()=>this.useShot()} style={{border:'none',background:'#2a6fdb',color:'#fff',borderRadius:13,padding:15,fontSize:15,fontWeight:600,cursor:'pointer'}}>{useLabel}</button>
        </div>
      </div>
    );
  }

  renderSummary(){
    const s = this.state, n = new Date(), shots = s.shots;
    const summaryShots = this.steps.map((step,i)=>({ title:step.title, timeLabel: shots[i] ? shots[i].timeLabel : '', img: shots[i] ? shots[i].img : null }));
    return (
      <div className="scr" style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
        <div style={{padding:'24px 22px 16px',background:'#fff',borderBottom:'1px solid #e6e4df'}}>
          <div style={{fontSize:12,letterSpacing:'.12em',color:'#2a6fdb',fontWeight:600}}>ตรวจก่อนส่ง</div>
          <div style={{fontSize:22,fontWeight:700,marginTop:3}}>ครบ 3 รูปแล้ว</div>
          <div style={{fontSize:13.5,color:'#6b6f76',marginTop:4}}>จะบันทึกเข้าคลาวด์ โฟลเดอร์ <b style={{color:'#1c1c1e'}}>{this.fmtDate(n)}</b></div>
        </div>
        <div style={{flex:1,padding:18,display:'flex',flexDirection:'column',gap:12}}>
          {summaryShots.map((shot,i)=>(
            <div key={i} style={{display:'flex',gap:13,alignItems:'center',background:'#fff',border:'1px solid #e6e4df',borderRadius:14,padding:11}}>
              {shot.img && <img src={shot.img} onClick={()=>this.openLightbox(shot.img)} style={{width:70,height:56,objectFit:'cover',borderRadius:9,flex:'none',cursor:'zoom-in',background:'#eee'}} />}
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:600}}>{shot.title}</div>
                <div style={{fontSize:12,color:'#8a8f96',fontFamily:'ui-monospace,monospace'}}>{shot.timeLabel}</div>
              </div>
              <div style={{color:'#1f8a5b',fontWeight:700,fontSize:15}}>✓</div>
            </div>
          ))}

          <div style={{background:'#fff',border:'1px solid #e6e4df',borderRadius:14,padding:14,marginTop:4}}>
            <label style={{fontSize:13,color:'#6b6f76',fontWeight:600}}>หมายเหตุ</label>
            <input value={s.plate} onChange={(e)=>this.setState({ plate:e.target.value })} placeholder="เช่น กข 1234 กรุงเทพฯ" style={{width:'100%',marginTop:8,border:'1px solid #d9d7d1',borderRadius:10,padding:12,fontSize:15,outline:'none'}} />
          </div>
        </div>
        <div style={{padding:'16px 18px 26px',background:'#fff',borderTop:'1px solid #e6e4df'}}>
          <button onClick={()=>this.submitCloud()} style={{width:'100%',border:'none',background:'#2a6fdb',color:'#fff',borderRadius:14,padding:16,fontSize:16.5,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:9}}>
            {s.submitting
              ? <React.Fragment><span style={{width:16,height:16,border:'2px solid rgba(255,255,255,.5)',borderTopColor:'#fff',borderRadius:'50%',display:'inline-block',animation:'spin .7s linear infinite'}}></span>กำลังส่ง…</React.Fragment>
              : 'ส่งเข้าคลาวด์ ↑'}
          </button>
        </div>
      </div>
    );
  }

  renderSuccess(){
    const s = this.state, si = s.successInfo || {};
    return (
      <div className="scr" style={{display:'flex',flexDirection:'column',minHeight:'100vh',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center',gap:16}}>
        <div style={{width:78,height:78,borderRadius:'50%',background:'#e7f4ec',color:'#1f8a5b',display:'flex',alignItems:'center',justifyContent:'center',fontSize:38,fontWeight:700}}>✓</div>
        <div style={{fontSize:24,fontWeight:700}}>ส่งเข้าคลาวด์แล้ว</div>
        <div style={{fontSize:14.5,color:'#6b6f76',lineHeight:1.6}}>บันทึก 3 รูปเข้าโฟลเดอร์<br/><b style={{color:'#1c1c1e',fontSize:16}}>{si.dateLabel||''}</b><br/>เวลา {si.time||''} · วันนี้มี {si.count||0} รายการ</div>
        <div style={{display:'flex',flexDirection:'column',gap:11,width:'100%',maxWidth:280,marginTop:8}}>
          <button onClick={()=>this.setState({ screen:'gallery' })} style={{width:'100%',border:'none',background:'#2a6fdb',color:'#fff',borderRadius:13,padding:15,fontSize:15.5,fontWeight:600,cursor:'pointer'}}>ดูในคลังรูป</button>
          <button onClick={()=>this.startNew()} style={{width:'100%',border:'1.5px solid #d9d7d1',background:'#fff',color:'#1c1c1e',borderRadius:13,padding:15,fontSize:15.5,fontWeight:600,cursor:'pointer'}}>เริ่มถ่ายคันใหม่</button>
        </div>
      </div>
    );
  }

  renderGallery(){
    const cloud = this.state.cloud || [];
    const map = {};
    cloud.forEach(r=>{ (map[r.dateKey] = map[r.dateKey] || { dateLabel:r.dateLabel, dateKey:r.dateKey, records:[] }).records.push(r); });
    const groups = Object.values(map).sort((a,b)=> a.dateKey < b.dateKey ? 1 : -1);

    return (
      <div className="scr" style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
        <div style={{padding:'20px 18px 14px',background:'#fff',borderBottom:'1px solid #e6e4df',display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>this.setState({ screen:'home' })} style={{border:'none',background:'none',fontSize:20,cursor:'pointer',padding:0,color:'#1c1c1e'}}>‹</button>
          <div><div style={{fontSize:12,letterSpacing:'.1em',color:'#2a6fdb',fontWeight:600}}>คลาวด์</div><div style={{fontSize:19,fontWeight:700}}>คลังรูป · แยกตามวันที่</div></div>
        </div>
        <div style={{flex:1,padding:'16px 16px 28px',display:'flex',flexDirection:'column',gap:20}}>
          {groups.length>0 ? groups.map((g,gi)=>(
            <div key={gi}>
              <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:11}}>
                <div style={{position:'relative',width:30,height:24,flex:'none'}}><div style={{position:'absolute',top:0,left:0,width:13,height:6,background:'#2a6fdb',borderRadius:'2px 2px 0 0'}}></div><div style={{position:'absolute',top:4,left:0,width:30,height:20,border:'2px solid #2a6fdb',borderRadius:3,background:'#fff'}}></div></div>
                <div style={{fontSize:16,fontWeight:700}}>{g.dateLabel}</div>
                <div style={{fontSize:12,color:'#8a8f96'}}>· {g.records.length} รายการ</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {g.records.map((rec,ri)=>{
                  const mapUrl = rec.location ? ('https://www.google.com/maps?q='+rec.location.lat+','+rec.location.lng) : null;
                  const gpsLabel = rec.location ? (rec.location.lat.toFixed(5)+', '+rec.location.lng.toFixed(5)+(rec.location.demo?' (จำลอง)':'')) : null;
                  return (
                    <div key={ri} style={{background:'#fff',border:'1px solid #e6e4df',borderRadius:14,padding:12}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:9}}>
                        <div style={{fontSize:14.5,fontWeight:600}}>{rec.plate || 'ไม่ระบุทะเบียน'}</div>
                        <div style={{fontSize:12,color:'#8a8f96',fontFamily:'ui-monospace,monospace'}}>{rec.time}</div>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7}}>
                        {(rec.shots||[]).map((th,ti)=>(
                          <div key={ti}>
                            <img src={th.img} onClick={()=>this.openLightbox(th.img)} style={{width:'100%',aspectRatio:'4 / 3',objectFit:'cover',borderRadius:8,cursor:'zoom-in',background:'#eee'}} />
                            <div style={{fontSize:10,color:'#8a8f96',textAlign:'center',marginTop:3}}>{th.title}</div>
                          </div>
                        ))}
                      </div>
                      {mapUrl && (
                        <a href={mapUrl} target="_blank" style={{display:'inline-flex',alignItems:'center',gap:7,marginTop:10,fontSize:11.5,color:'#2a6fdb',textDecoration:'none',fontFamily:'ui-monospace,monospace'}}><span style={{width:7,height:7,borderRadius:'50%',background:'#2a6fdb',display:'inline-block'}}></span>แผนที่ · {gpsLabel}</a>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )) : (
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,padding:'60px 20px',textAlign:'center',color:'#a7a49c'}}>
              <div style={{fontSize:15,fontWeight:600,color:'#6b6f76'}}>ยังไม่มีรูปในคลาวด์</div>
              <div style={{fontSize:13}}>ถ่ายครบ 3 ขั้นแล้วกดส่ง รูปจะมาอยู่ที่นี่</div>
            </div>
          )}
        </div>
      </div>
    );
  }

  renderOverlays(){
    const s = this.state;
    return (
      <React.Fragment>
        {s.lightbox && (
          <div onClick={()=>this.setState({ lightbox:null })} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,padding:20,cursor:'zoom-out'}}>
            <img src={s.lightbox} style={{maxWidth:'100%',maxHeight:'100%',borderRadius:8}} />
          </div>
        )}

        {s.qrOpen && (
          <div onClick={()=>this.closeQR()} style={{position:'fixed',inset:0,background:'rgba(20,22,26,.72)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:70,padding:24}}>
            <div onClick={(e)=>e.stopPropagation()} style={{background:'#fff',borderRadius:20,padding:24,maxWidth:300,width:'100%',textAlign:'center',boxShadow:'0 14px 44px rgba(0,0,0,.32)'}}>
              <div style={{fontSize:19,fontWeight:700}}>เปิดบนมือถือ</div>
              <div style={{fontSize:13,color:'#6b6f76',margin:'6px 0 16px',lineHeight:1.5}}>สแกน QR นี้ด้วยกล้องมือถือ เพื่อเปิดแอปถ่ายรูปบนเครื่องนั้น</div>
              <div style={{display:'flex',justifyContent:'center',padding:14,background:'#f4f3f0',borderRadius:14,minHeight:216,alignItems:'center'}}>
                {s.qrImg && <img src={s.qrImg} style={{width:216,height:216,imageRendering:'pixelated',display:'block'}} />}
              </div>
              <div style={{fontSize:10,color:'#a7a49c',fontFamily:'ui-monospace,monospace',marginTop:12,wordBreak:'break-all',lineHeight:1.4}}>{typeof window!=='undefined' ? window.location.href : ''}</div>
              <button onClick={()=>this.closeQR()} style={{marginTop:16,width:'100%',border:'none',background:'#1c1c1e',color:'#fff',borderRadius:12,padding:12,fontSize:14,fontWeight:600,cursor:'pointer'}}>ปิด</button>
            </div>
          </div>
        )}

        {s.toast && (
          <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',zIndex:60,background:'#1f8a5b',color:'#fff',padding:'12px 18px',borderRadius:12,fontSize:14,fontWeight:600,boxShadow:'0 6px 22px rgba(0,0,0,.22)',display:'flex',alignItems:'center',gap:9,maxWidth:'90%',whiteSpace:'nowrap'}}>
            <span style={{width:20,height:20,borderRadius:'50%',background:'rgba(255,255,255,.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>✓</span>{s.toast}
          </div>
        )}
      </React.Fragment>
    );
  }

  render(){
    const s = this.state;
    let screen = null;
    if (s.screen==='home') screen = this.renderHome();
    else if (s.screen==='capture') screen = this.renderCapture();
    else if (s.screen==='review') screen = this.renderReview();
    else if (s.screen==='summary') screen = this.renderSummary();
    else if (s.screen==='success') screen = this.renderSuccess();
    else if (s.screen==='gallery') screen = this.renderGallery();

    return (
      <div style={{minHeight:'100vh',display:'flex',justifyContent:'center',background:'#d9d7d1'}}>
        <div style={{width:'100%',maxWidth:440,minHeight:'100vh',background:'#f4f3f0',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden',boxShadow:'0 0 40px rgba(0,0,0,.08)'}}>
          {screen}
          {this.renderOverlays()}
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<CarPhotoApp />);
</script>
<script>
  // Compile with the classic JSX runtime so JSX -> React.createElement (global React),
  // avoiding the automatic runtime's bare "react/jsx-runtime" import.
  (function(){
    var src = document.getElementById('app-src').textContent;
    var compiled = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
    (0, eval)(compiled);
  })();
</script>
<script>
  // ลงทะเบียน service worker เพื่อให้ติดตั้งเป็นแอปได้ (PWA) — เฉพาะหน้านี้
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((e) => console.warn('sw register failed', e));
    });
  }
</script>
</body>
</html>
